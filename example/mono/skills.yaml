global:
  # 全スキルインストールの場合は空リストにする
  mono0926/skills:
  mono0926/skills-sync:
  genkit-ai/skills:
  google-gemini/gemini-skills:
    - '*'
    - '!gemini-api-dev' # gemini-interactions-api との重複を避けるため
  google-gemini/gemini-cli:
    - '*'
    - '!pirate-skill' # ジョークスキルのため
  firebase/agent-skills:
  kevmoo/dash_skills:
    - '*'
    - '!dart-checks-migration' # 移行完了済みのため
    - '!dart-matcher-best-practices' # 移行完了済みのため
  # openclaw/openclaw:

  # 個別インストールの場合はリストを書く
  flutter/skills:
    - '*'
    - '!flutter-architecture' # 既存アーキテクチャに特化するため
    - '!flutter-state-management' # 既存アーキテクチャに特化するため
    - '!flutter-animation' # flutter-animations との重複を避けるため
    - '!flutter-localization' # flutter-internationalization を優先するため
    - '!flutter-environment-setup-linux' # macOS環境では不要なため
    - '!flutter-environment-setup-windows' # macOS環境では不要なため
    - '!flutter-http-and-json' # flutter-networking との重複を避けるため
    - '!flutter-databases' # flutter-drift 等の特化型があるため
    - '!flutter-duit-bdui' # BDUI実装時以外は不要なため
  tokoroten/prompt-review:
    - prompt-review
  sickn33/antigravity-awesome-skills:
    - typescript-expert
  github/awesome-copilot:
    - gh-cli
  vercel-labs/skills:
    - find-skills
  rodydavis/skills:
    - flutter-control-and-screenshot
  anthropics/skills:
    - frontend-design
    - skill-creator
  nextlevelbuilder/ui-ux-pro-max-skill:
    - ui-ux-pro-max
  obra/superpowers:
    - brainstorming
    - test-driven-development
    - using-superpowers
    - verification-before-completion
  juparave/dotfiles:
    - flutter-riverpod-expert
  wshobson/agents:
    - nodejs-backend-patterns
    - design-system-patterns
    - mobile-android-design
    - mobile-ios-design
    - responsive-design
  madteacher/mad-agents-skills:
    - '*'
    - '!flutter-navigation' # flutter-routing-and-navigation を優先するため

  jimliu/baoyu-skills:
    - release-skills

  # 重複気味
  # jeffallan/claude-skills:
  #   - flutter-expert

