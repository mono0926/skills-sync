# skills.yaml example

global:
  # Sync all skills from mono0926/skills_sync
  mono0926/skills_sync: []

  # Sync specific skills from anthropics/skills
  anthropics/skills:
    - '*' # Include everything
    - '!recipe-*' # But exclude everything starting with 'recipe-'

# Project-specific overrides
./lib/src:
  mono0926/skills:
    - dart-*
