version: 0.0.1
homepage: https://github.com/mono0926/skills-sync
repository: https://github.com/mono0926/skills-sync

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.5.0
  cli_completion: ^0.5.1
  mason_logger: ^0.3.1
  path: ^1.8.3
  yaml: ^3.1.3

dev_dependencies:
  cider: ^0.2.10
  pedantic_mono: any
  test: ^1.24.0

executables:
  skills_sync: skills_sync
